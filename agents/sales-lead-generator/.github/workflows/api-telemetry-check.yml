name: API Telemetry & Schema Guard

on:
  schedule:
    # Runs every day at 06:00 UTC (well before your 13:00 UTC production cron job)
    - cron: "0 6 * * *"
  push:
    branches: [ main ]
    paths:
      - 'agents/sales-lead-generator/etl.py'
      - 'agents/sales-lead-generator/config.json'
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  telemetry-validation:
    name: Validate Upstream Platform Schemas
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents/sales-lead-generator

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip' # Speeds up subsequent runs

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Ensure test frameworks are available
          pip install pytest

      - name: Decrypt Service Account Fallback
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" > service_account.json

      - name: Run Schema Mock & Telemetry Test Suite
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          # Pass dummy/live keys depending on your live sandbox rules
          X_API_BEARER_TOKEN: ${{ secrets.X_API_BEARER_TOKEN }}
          LINKEDIN_API_KEY: ${{ secrets.LINKEDIN_API_KEY }}
        run: |
          # Executes your test script which mocks and smoke-tests live shapes
          python test-etl.py